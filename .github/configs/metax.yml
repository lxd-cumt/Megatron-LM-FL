  functional:
    train:
      - model: gpt
        test_case: qwen3_0p6b_mcore_te_tp1_pp1_no_mmap_bin_files
        training_script: pretrain_gpt.py
        n_repeat: 1
        golden_environment: dev
        golden_platform: c500
        enable_lightweight_mode: false
